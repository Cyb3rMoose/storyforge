name: Terraform — Validate & Plan

on:
  pull_request:
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"

jobs:
  terraform:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      # ── IaC Security scan — runs before AWS credentials are needed ─────────────
      - name: Install Checkov
        run: pip install checkov

      - name: Checkov IaC Scan
        working-directory: terraform
        run: |
          checkov -d . \
            --framework terraform \
            --output cli \
            --skip-check CKV_AWS_86,CKV_AWS_65,CKV2_AWS_42
          # CKV_AWS_86  — CloudFront access logging (overkill for prototype)
          # CKV_AWS_65  — CloudFront access logging (duplicate check)
          # CKV2_AWS_42 — CloudFront TLS 1.2 minimum (using default cert for now)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      # Fail if any .tf files are not formatted
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # Validate syntax and internal consistency
      - name: Terraform Validate
        run: terraform validate

      # Run plan — on PRs this acts as a preview; output posted as a comment
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true  # Don't block if plan has warnings
        env:
          TF_VAR_iam_dev_user_name: project_user

      # Post plan output as a PR comment
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📋
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Triggered by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1
