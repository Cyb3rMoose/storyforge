name: Terraform - Validate & Plan

on:
  pull_request:
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"

jobs:
  terraform:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      # ── IaC Security scan — runs before AWS credentials are needed ─────────────
      - name: Install Checkov
        run: pip install checkov

      - name: Checkov IaC Scan
        run: |
          checkov -d . --framework terraform --output cli \
            --skip-check CKV_AWS_86,CKV_AWS_65,CKV2_AWS_42

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      # Fail if any .tf files are not formatted
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # Validate syntax and internal consistency (no backend needed)
      - name: Terraform Validate
        run: terraform validate -no-color

      # Note: terraform plan is skipped because state is local only.
      # Migrate to an S3 backend to enable plan/apply in CI.
